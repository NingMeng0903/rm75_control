# Hybrid motion demo — core: rm75_control.control.hybrid_motion
# Generic: python tmp/Velocity_Admittance/run_admittance.py
# Demo:    python tmp/Velocity_Admittance/demo/sin_tool_y_z2n.py

reference:
  shaper: pass_through    # pass_through | ruckig (not wired yet)

timing:
  dt_ms: 10.0
  async_poll_ms: 10.0

startup:
  pose_slot: d
  pre_movev_settle_s: 1.5      # +0.3s in exit → 1.8s static before movev init
  settle_frames: 50             # zero-vel frames right after init
  movev_quiescent_mm: 0.25    # TCP must move < this for quiescence
  movev_quiescent_consecutive: 10
  post_handoff_zero_s: 1.0      # extra zero-vel bridge before main loop

frames:
  euler_order: xyz   # rm_get_current_arm_state pose; match configs/force_sensor.yaml

velocity_canfd:
  frame_type: 1          # 0 tool, 1 work/base — v_cmd output is base frame
  avoid_singularity: 0
  follow: true
  trajectory_mode: 0     # 0 passthrough — smoothing in controller only
  radio: 0

force:
  phi_source: phi_recommended
  buffer_s: 4.0
  min_samples: 35
  use_inertia: false
  desired_z_n: 3.0
  # Causal online estimator (O(1)/tick, replaces the acausal whole-buffer filtfilt).
  causal_fc_hz: 6.0
  causal_order: 2
  causal_history: 5

trajectory_demo:
  type: sin_tool_y       # hold | sin_tool_y | sin_base_y | sin_base_y_tool_rz
  amplitude_mm: 5.0
  period_s: null         # auto from y_max_vel_cm_s if null
  y_max_vel_cm_s: 1.0

# Legacy key — still read if trajectory_demo is absent
trajectory:
  type: sin_tool_y
  amplitude_mm: 5.0
  period_s: null
  y_max_vel_cm_s: 1.0

hybrid_motion:
  force_axes: [0, 0, 1, 0, 0, 0]   # tool-Z force-controlled (TFF: = contact normal)
  enable_normal_tracking: false    # true → rotate tool-Z to null lateral forces
  kp_pos: [0.3, 0.6, 0.0, 0.4, 0.4, 0.4]   # tool-frame PBAC gains (X,Y,-,Rx,Ry,Rz)
  track_axes: [1, 1, 0, 1, 1, 1]
  system_delay_s: 0.015
  contact_threshold_n: 0.5
  deadband_n: 0.3
  deadband_width_n: 0.2
  pos_err_deadband_m: 0.0005
  pos_correction_max_m_s: 0.05
  # TRUE 2nd-order admittance on tool-Z: M·v̇ + D·v = (F_des − F_ext).
  admittance_mass_z: 3.0
  admittance_damping_z: 60.0
  # Dimeas online variable damping (raise D when force oscillates, then decay).
  var_damping_enabled: true
  var_damping_omega_c_hz: 3.5
  var_damping_lambda: 0.99
  var_damping_f_max_n: 30.0
  var_damping_d_u: 60.0
  var_damping_m_u: 0.0
  var_damping_dc_alpha: 0.02
  k_align: 0.02
  max_vz_tool_m_s: 0.05
  max_velocity: [0.2, 0.2, 0.05, 0.08, 0.08, 0.08]
  max_acceleration: [1.0, 1.0, 0.05, 0.15, 0.15, 0.15]
  release_vz_up_m_s: 0.05
  release_vz_down_m_s: 0.05
  # Legacy proportional/integral force gains — unused for tool-Z (2nd-order admittance
  # supersedes them); kept for back-compat / non-Z force axes.
  k_fp_press: 0.015
  k_fp_release: 0.005
  k_fi: 0.008
  integral_limit: 0.05

monitor:
  enabled: false
  window_s: 25.0
  refresh_hz: 12.0
