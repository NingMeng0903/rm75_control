# Human soft-tissue scan — adaptive ζ + Dimeas; df spike gate; no v_r (A/B fixes).
#
# Run:
#   python tmp/Velocity_Admittance/demo/d_to_a_sin_tool_y.py \
#     --config tmp/Velocity_Admittance/demo/config/human_soft_scan.yaml --log

reference:
  shaper: pass_through

timing:
  dt_ms: 10.0
  async_poll_ms: 10.0

startup:
  pose_slot: d
  settle_frames: 50
  hold_s: 1.0
  pre_movev_settle_s: 2.0
  skip_resync_after_movej: true   # move_j already at slot — skip 2nd resync move
  quiescent_warmup_frames: 25     # ignore init snap in quiescence detector
  quiescent_reject_step_mm: 2.0   # reject quiescence if quiet streak had >2mm step
  movev_quiescent_mm: 0.25
  movev_quiescent_consecutive: 10
  post_handoff_zero_s: 1.0
  auto_realign_on_snap: true
  realign_min_snap_mm: 3.0
  wait_contact: true
  auto_start_under_n: 0.5
  auto_start_hold_s: 0.5
  hold_active: true
  hold_kp_pos: 1.2
  hold_kp_rot: 1.2
  hold_deadband_mm: 0.3
  hold_max_vel_m_s: 0.015
  hold_max_omega_rad_s: 0.08
  hold_accel_m_s2: 0.25

frames:
  euler_order: xyz
  control_frame: tool

velocity_canfd:
  frame_type: 0
  avoid_singularity: 0
  follow: true
  trajectory_mode: 0
  radio: 0

force:
  phi_source: phi_recommended
  buffer_s: 2.0
  min_samples: 22
  use_inertia: false
  desired_z_n: 2.5
  causal_fc_hz: 4.5
  causal_order: 2
  causal_history: 5

trajectory_demo:
  type: slot_transfer_sin_tool_y
  from_slot: d
  to_slot: a
  transfer_s: 15.0              # 前 15s 为 d→a 平滑转移；16cm 正弦在 transfer 结束后才开始
  scan_mode: sin_tool_y
  y_peak_to_peak_cm: 16.0       # tool-Y 峰峰值 16cm（±8cm）
  y_max_vel_cm_s: 1.5
  soft_start: true
  ramp_s: 3.0

hybrid_motion:
  force_axes: [0, 0, 1, 0, 0, 0]
  track_axes: [1, 1, 0, 1, 1, 1]
  kp_pos: [0.18, 0.60, 0.0, 0.25, 0.25, 0.25]   # [1]=tool-Y 跟踪（与 d_to_a demo 对齐）
  deadband_n: 0.5
  deadband_width_n: 0.3
  system_delay_s: 0.015
  pos_err_deadband_m: 0.001
  pos_correction_max_m_s: 0.05
  admittance_mass_z: 3.0
  admittance_damping_z: 50.0
  force_derivative_gain_z: 0.06   # damp Ḟ from scan geometry ripple
  var_damping_enabled: true
  var_damping_omega_c_hz: 3.5
  var_damping_lambda: 0.99
  var_damping_f_max_n: 30.0
  var_damping_d_u: 60.0
  var_damping_m_u: 0.0
  var_damping_dc_alpha: 0.02
  proactive_feedforward: false       # v_r amplifies scan ripple; off until cap/notch fixed
  alpha_proactive: 0.012
  adaptive_ke:
    enabled: true
    zeta: 1.1
    ke_initial: 200.0
    ke_min: 120.0
    ke_max: 8000.0
    ke_forgetting: 0.995
    ke_forgetting_inc: 0.80
    displacement_source: admittance
    gate_scan_velocity: false
    gate_df_spike: true              # reject |ΔF|>5N glitches (keep scan K̂_e updates)
    df_spike_n: 5.0
    f_err_gate_n: 3.5
    dx_threshold_m: 0.00008
    contact_force_n: 1.0
    bd_min: 42.0
    bd_max: 350.0                    # 2ζ√(m·ke_max) ≈ 341 with m=3, ke_max=8000, ζ=1.1
    bd_slew_max: 1200.0              # faster D track when K̂_e rises on hard patches
    ke_slew_max: 2000.0
  max_vz_tool_m_s: 0.12
  approach_vz_tool_m_s: 0.015
  max_velocity: [0.025, 0.10, 0.12, 0.10, 0.10, 0.10]
  max_acceleration: [0.4, 0.8, 2.0, 0.4, 0.4, 0.4]
  enable_normal_tracking: false

monitor:
  log: false
  log_every: 1
