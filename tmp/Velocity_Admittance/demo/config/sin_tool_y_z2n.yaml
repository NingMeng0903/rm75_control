# Demo trajectory plugin + tool-Z force hybrid.
# Architecture (sleeve / slider):
#   trajectory → pose_d + vel_ff (base frame)
#   controller → Tool-X/Y from R.T @ v_pos_base; Tool-Z from force admittance only
#   open_loop: true → vel_ff only (245e676 stable baseline)
#
# Init snap: rm_set_movev_canfd_init may shift ~1–6mm once. Do NOT run extra zero-v
# settle or post_init_realign — both made snap worse in testing (2026-06-29).
# After move_j use pre_movev_prep: minimal or skip (NOT full recover, NOT light slow_stop).
#
# Run:
#   python tmp/Velocity_Admittance/demo/sin_tool_y_z2n.py --trajectory sin_tool_y --log

timing:
  dt_ms: 10.0
  async_poll_ms: 10.0

startup:
  pose_slot: d
  settle_frames: 30
  hold_s: 1.0
  pre_movev_prep: minimal     # skip | minimal | light | full
  pre_movev_settle_s: 0.0
  post_init_realign: false
  auto_recover: true
  wait_contact: true
  auto_start_under_n: 0.5
  auto_start_hold_s: 0.5
  approach_ramp_s: 1.5

frames:
  euler_order: xyz
  control_frame: tool

velocity_canfd:
  frame_type: 0
  avoid_singularity: 0
  follow: true
  trajectory_mode: 0
  radio: 0

force:
  phi_source: phi_recommended
  buffer_s: 2.0
  min_samples: 22
  fc_hz: 4.0
  use_inertia: false
  desired_z_n: 3.0

trajectory:
  type: sin_base_y_tool_rz
  y_peak_to_peak_cm: 16.0
  rz_amplitude_deg: 12.0
  y_max_vel_cm_s: 3.0
  soft_start: true
  ramp_s: 2.0
  open_loop: true

controller:
  force_axes: [0, 0, 1, 0, 0, 0]
  open_loop: true
  track_axes: [0, 1, 0, 0, 0, 0]
  kp_pos: [0, 0, 0, 0, 0, 0]
  deadband_n: 0.3
  deadband_width_n: 0.2
  system_delay_s: 0.015
  k_fp_press: 0.045
  k_fp_release: 0.025
  k_fi: 0.001
  integral_limit: 0.015
  max_vz_tool_m_s: 0.15
  approach_vz_tool_m_s: 0.03
  max_velocity: [0.03, 0.10, 0.15, 0.15, 0.15, 0.35]
  max_acceleration: [0.5, 1.0, 0.5, 1.0, 1.0, 1.5]

monitor:
  log: false
  log_every: 1
