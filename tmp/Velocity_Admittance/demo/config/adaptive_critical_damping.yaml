# Adaptive critical damping (Yanan Li / Ge impedance learning line).
#
# b_d(t) = 2ζ√(m_d · K̂_e) with online K̂_e from EWMA(ΔF/Δx) on tool-Z penetration.
# m_d fixed; D adapts so ζ≈1 on soft tissue (~200 N/m) and hard contact (~5k+ N/m).
#
# Papers:
#   Li & Ge, IEEE T-CST 2014 — Impedance Learning for Unknown Environments
#   Li, Ge & Yang, Int. J. Control 2011 — Learning impedance control
#
# Run:
#   python tmp/Velocity_Admittance/demo/d_to_a_sin_tool_y.py \
#     --config tmp/Velocity_Admittance/demo/config/adaptive_critical_damping.yaml --log

reference:
  shaper: pass_through

timing:
  dt_ms: 10.0
  async_poll_ms: 10.0

startup:
  pose_slot: d
  settle_frames: 50
  hold_s: 1.0
  pre_movev_settle_s: 1.5
  movev_quiescent_mm: 0.25
  movev_quiescent_consecutive: 10
  post_handoff_zero_s: 1.0
  wait_contact: true
  auto_start_under_n: 0.5
  auto_start_hold_s: 0.5
  hold_active: true
  hold_kp_pos: 1.2
  hold_kp_rot: 1.2
  hold_deadband_mm: 0.3
  hold_max_vel_m_s: 0.015
  hold_max_omega_rad_s: 0.08
  hold_accel_m_s2: 0.25

frames:
  euler_order: xyz
  control_frame: tool

velocity_canfd:
  frame_type: 0
  avoid_singularity: 0
  follow: true
  trajectory_mode: 0
  radio: 0

force:
  phi_source: phi_recommended
  buffer_s: 2.0
  min_samples: 22
  use_inertia: false
  desired_z_n: 2.5
  causal_fc_hz: 4.5
  causal_order: 2
  causal_history: 5

trajectory_demo:
  type: slot_transfer_sin_tool_y
  from_slot: d
  to_slot: a
  transfer_s: 15.0
  scan_mode: sin_tool_y
  y_peak_to_peak_cm: 12.0
  y_max_vel_cm_s: 1.5
  soft_start: true
  ramp_s: 3.0

hybrid_motion:
  force_axes: [0, 0, 1, 0, 0, 0]
  track_axes: [1, 1, 0, 1, 1, 1]
  kp_pos: [0.18, 0.32, 0.0, 0.25, 0.25, 0.25]
  deadband_n: 0.5
  deadband_width_n: 0.3
  system_delay_s: 0.015
  pos_err_deadband_m: 0.001
  pos_correction_max_m_s: 0.04
  admittance_mass_z: 2.0
  admittance_damping_z: 50.0          # fallback when adaptive_ke.enabled=false
  force_derivative_gain_z: 0.02
  var_damping_enabled: false
  max_vz_tool_m_s: 0.06
  approach_vz_tool_m_s: 0.015
  max_velocity: [0.025, 0.06, 0.06, 0.10, 0.10, 0.10]
  max_acceleration: [0.4, 0.8, 1.5, 0.4, 0.4, 0.4]
  enable_normal_tracking: false
  adaptive_ke:
    enabled: true
    zeta: 1.0                         # critical damping target
    ke_initial: 300.0                 # soft-tissue prior [N/m]
    ke_forgetting: 0.92
    ke_min: 50.0
    ke_max: 30000.0
    dx_threshold_m: 0.0001            # 0.1 mm min motion to update
    contact_force_n: 0.8              # gate: only adapt above this |Fz|
    bd_max: 500.0
    bd_slew_max: 1500.0               # limit D jump [N·s/m²]

monitor:
  log: false
  log_every: 1
