# Force compensation pipeline — config/force_id.yaml, config/poses.yaml
# Library: rm75_control.force.compensation
# Entry: tmp/force_compensation/force_calibrate.py, force_monitor.py

poses_yaml: poses.yaml

sequence: [a, b, c, d]
return_home: a

collect:
  move_speed: 15
  settle_timeout_s: 15.0
  dt_ms: 10.0
  log_every: 10
  scale: 1.0
  warmup_s: 3.0
  follow: false
  cartesian_ramp_down_s: 2.5
  movev_settle_frames: 30
  movev_quiescent_mm: 0.3

  cartesian:
    duration_s: 30.0
    max_delta_mm: 5.0
    max_orient_deg:
      a: 24.0
      b: 32.0
      c: 32.0
    amp_mm: [4.0, 4.0, 2.0]
    amp_mm_slots:
      # pose_a TCP ~horizontal: X-dominant linear + large Rx (gravity→Fx) at this pose.
      a: [4.5, 2.5, 1.5]
      b: [4.5, 4.0, 2.5]
      c: [4.5, 4.0, 2.5]
    amp_rot_deg: [14.0, 16.0, 12.0]
    amp_rot_deg_slots:
      a: [24.0, 14.0, 12.0]
      b: [16.0, 20.0, 16.0]
      c: [16.0, 20.0, 16.0]
    freqs_hz:
      - [0.12, 0.18]
      - [0.13, 0.19]
      - [0.11, 0.16]
      - [0.22, 0.33]
      - [0.25, 0.37]
      - [0.24, 0.31]

  pose_d:
    # Phase 0: joint 45s. Phase 1: pose_d_vel_burst 45s (enter_movev_session handoff).
    joint_duration_s: 45.0
    burst_duration_s: 45.0
    joint_amp_deg: [10.0, 8.0, 8.0, 14.0, 16.0, 14.0, 32.0]
    joint_max_delta_deg: [12.0, 12.0, 12.0, 18.0, 20.0, 18.0, 35.0]
    joint_freqs_hz:
      - [0.14, 0.21]
      - [0.13, 0.19]
      - [0.12, 0.18]
      - [0.22, 0.31]
      - [0.24, 0.33]
      - [0.23, 0.30]
      - [0.20, 0.29]
    velocity_burst:
      profile: pose_d_vel_burst
      # base wx→wy→wz; peak angle ≈ amp_deg_s / (360*freq_hz) deg per tone
      amp_deg_s: 18.0
      freqs_hz: [0.22]
      ramp_down_s: 4.0

fit:
  force_sensor: configs/force_sensor.yaml
  holdout_frac: 0.2
  alpha_percentile: 70.0
  min_burst_rows: 300
  min_high_alpha_rows: 150
  inertia_r_max_m: 0.12
  npz_slots: [a, b, c, d]
  phi_output: force_id_phi.json
  phi_recommended_key: phi_burst

monitor:
  poll_ms: 50.0
  window_s: 25.0
  buffer_s: 4.0
  min_samples: 35
  refresh_hz: 12.0
  phi_source: phi_recommended
  use_inertia: true
